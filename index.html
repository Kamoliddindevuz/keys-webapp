<!DOCTYPE html>
<html lang="uz">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keys WebApp</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="container">

<header>

<div class="logo">
💎 KEYS WEBAPP
</div>

<div class="user-panel">

<div class="user">

<div class="avatar">
👤
</div>

<div>

<h3 id="username">Mehmon</h3>

<p>ID: <span id="userid">100001</span></p>

</div>

</div>

<div class="balance">

<span>Balans</span>

<h2 id="balance">1000 💎</h2>

</div>

</div>

</header>

<section class="menu">

<button>🏠 Home</button>

<button>📦 Cases</button>

<button>🎒 Inventory</button>

<button>👤 Profile</button>

</section>

<section class="cases">

<div class="case bronze">

<h2>🥉 Bronze Case</h2>

<p>100 💎</p>

<button onclick="openCase('bronze')">
OPEN
</button>

</div>

<div class="case silver">

<h2>🥈 Silver Case</h2>

<p>500 💎</p>

<button onclick="openCase('silver')">
OPEN
</button>

</div>

<div class="case gold">

<h2>🥇 Gold Case</h2>

<p>1000 💎</p>

<button onclick="openCase('gold')">
OPEN
</button>

</div>
<section class="roulette">

<h2>🎰 Lucky Spin</h2>

<div class="roulette-box">

<div class="pointer"></div>

<div id="track" class="track">

</div>

</div>

</section>

<section class="result">

<h2 id="result">
🎁 Case ochishga tayyor
</h2>

</section>

<footer>

<button onclick="showInventory()">
🎒 Inventar
</button>

<button onclick="showProfile()">
👤 Profil
</button>

<button onclick="dailyReward()">
🎁 Bonus
</button>

</footer>

</div>

<div id="inventoryModal" class="modal">

<div class="modal-box">

<h2>🎒 Inventar</h2>

<div id="inventoryList"></div>

<button onclick="closeInventory()">
Yopish
</button>

</div>

</div>

<div id="profileModal" class="modal">

<div class="modal-box">

<h2>👤 Profil</h2>

<div id="profileInfo"></div>

<button onclick="closeProfile()">
Yopish
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
