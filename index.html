<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keys ochish</title>

<style>
body{
font-family:Arial,sans-serif;
background:#121212;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#1f1f1f;
padding:25px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#0099ff;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0077cc;
}

#result{
margin-top:15px;
font-size:18px;
font-weight:bold;
}
</style>

</head>
<body>

<div class="box">
<h2>🎁 Keys ochish</h2>

<input type="text" id="key" placeholder="Key kiriting">

<button onclick="checkKey()">Ochish</button>

<div id="result"></div>
</div>

<script>
function checkKey(){

let key=document.getElementById("key").value;

if(key=="123456"){
document.getElementById("result").innerHTML="✅ Key qabul qilindi!";
}else{
document.getElementById("result").innerHTML="❌ Noto'g'ri key!";
}

}
</script>

</body>
</html>
